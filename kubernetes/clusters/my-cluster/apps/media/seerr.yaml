# Seerr
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: seerr-chart
      version: "3.5.1"
      sourceRef:
        kind: HelmRepository
        name: seerr-team
        namespace: media
  values:
    env:
      TZ: Australia/Sydney
      PUID: "1000"
      PGID: "1000"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values: [mainboy]
    persistence:
      config:
        enabled: true
        existingClaim: seerr-config-pvc
    service.port: 5055
