# abiotic-factor
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: games-abiotic-factor
  namespace: flux-system
spec:
  interval: 1m
  targetNamespace: abiotic-factor
  path: ./kubernetes/clusters/my-cluster/games/abiotic-factor
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age